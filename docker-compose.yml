services:
  crosspost:
    image: ghcr.io/uberkitten/crosspost-tool:main
    # To build locally instead, comment out image and uncomment build:
    # build: .
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      # Uncomment to use Claude CLI for alt text (requires Claude Code auth on host)
      # - ~/.claude:/root/.claude:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/config"]
      interval: 30s
      timeout: 5s
      retries: 3
