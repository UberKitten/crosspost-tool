services:
  crosspost:
    image: ghcr.io/uberkitten/crosspost-tool:main
    # To build locally instead, comment out image and uncomment build:
    # build: .
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - HOME=/home/node
    volumes:
      - ./data:/app/data
      # Claude CLI auth (for AI alt text without ANTHROPIC_API_KEY)
      - ~/.claude:/home/node/.claude:ro
      - ~/.claude.json:/home/node/.claude.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/config"]
      interval: 30s
      timeout: 5s
      retries: 3
